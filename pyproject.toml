[tool.black]
line-length = 99
skip-string-normalization = true
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 99
force_sort_within_sections = true
known_first_party = ["nvidia_monitor"]
known_third_party = ["launch", "launch_ros", "rclpy", "diagnostic_updater", "diagnostic_msgs"]
