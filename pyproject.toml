[tool.ruff]
line-length = 99
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "C4", "SIM"]
ignore = ["E501"]

[tool.ruff.lint.isort]
force-sort-within-sections = true
known-first-party = ["nvidia_monitor"]
known-third-party = ["launch", "launch_ros", "rclpy", "diagnostic_updater", "diagnostic_msgs"]

[tool.ruff.format]
quote-style = "single"
