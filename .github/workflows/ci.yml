name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run to catch upstream ROS / dep regressions.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  ros:
    name: ${{ matrix.distro }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: jazzy
            container: ubuntu:24.04
          - distro: lyrical
            container: ubuntu:26.04
          - distro: rolling
            container: ubuntu:26.04
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Install base packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            sudo curl gnupg ca-certificates lsb-release locales git
          locale-gen en_US.UTF-8
      - uses: actions/checkout@v6

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.distro }}
          use-ros2-testing: true

      - name: Install ROS dependencies
        run: |
          rosdep update --include-eol-distros
          rosdep install -r --from-paths . --ignore-src --rosdistro ${{ matrix.distro }} -y \
            --skip-keys "python3-pynvml rti-connext-dds-5.3.1 rti-connext-dds-6.0.1 rti-connext-dds-7.3.0 rti-connext-dds-7.7.0"

      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: nvidia_monitor
          target-ros2-distro: ${{ matrix.distro }}
          skip-rosdep-install: true
          skip-tests: false
          import-token: ${{ secrets.GITHUB_TOKEN }}
