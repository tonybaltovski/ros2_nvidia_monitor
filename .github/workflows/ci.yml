name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly run to catch upstream ROS / dep regressions.
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: pre-commit/action@v3.0.1

  ros:
    name: ${{ matrix.distro }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: jazzy
            container: ubuntu:24.04
          - distro: lyrical
            container: ubuntu:26.04
          - distro: rolling
            container: ubuntu:26.04
    runs-on: ubuntu-24.04
    container:
      image: ${{ matrix.container }}
    steps:
      - name: Install base packages
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            sudo curl gnupg ca-certificates lsb-release locales git
          locale-gen en_US.UTF-8
      - uses: actions/checkout@v6

      - uses: ros-tooling/setup-ros@v0.7
        with:
          required-ros-distributions: ${{ matrix.distro }}

      - name: Install pynvml (no rosdep key)
        run: apt-get install -y python3-pynvml

      - uses: ros-tooling/action-ros-ci@v0.4
        with:
          package-name: nvidia_monitor
          target-ros2-distro: ${{ matrix.distro }}
          skip-tests: false

      - name: Upload colcon logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: colcon-logs-${{ matrix.distro }}
          path: ros_ws/log
